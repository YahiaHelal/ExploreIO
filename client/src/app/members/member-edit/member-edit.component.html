<div class="profile-edit-wrapper" *ngIf="member">

  <!-- Header Row -->
  <div class="profile-header">
    <h1 class="profile-title">Your Profile</h1>
    <div class="unsaved-alert" *ngIf="editForm.dirty">
      <i class="fa fa-info-circle"></i>
      You have unsaved changes — these will be lost if you navigate away.
    </div>
  </div>

  <div class="profile-layout">

    <aside class="profile-sidebar">
      <div class="profile-card">
        <div class="profile-img-wrap">
          <img [src]="member.photoUrl || './assets/user.png'" [alt]="member.knownAs" class="profile-img" />
        </div>
        <div class="profile-meta">
          <div class="meta-row">
            <span class="meta-label"><i class="fa fa-map-marker"></i> Location</span>
            <span class="meta-value">{{ member.city }}, {{ member.country }}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label"><i class="fa fa-birthday-cake"></i> Age</span>
            <span class="meta-value">{{ member.age }}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label"><i class="fa fa-clock-o"></i> Last Active</span>
            <span class="meta-value">{{ member.lastActive }}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label"><i class="fa fa-calendar"></i> Member Since</span>
            <span class="meta-value">{{ member.createdAt }}</span>
          </div>
        </div>
        <div class="profile-card-footer">
          <button class="btn-save" type="submit" form="editForm" [disabled]="!editForm.dirty">
            <i class="fa fa-save"></i> Save Changes
          </button>
        </div>
      </div>
    </aside>

    <div class="profile-content">
      <tabset class="member-tabset">

        <tab heading="About {{ member.knownAs }}">
          <form id="editForm" #editForm="ngForm" (ngSubmit)="updateMember()" autocomplete="off">

            <div class="form-section">
              <label class="form-label">Description</label>
              <textarea class="form-textarea" [(ngModel)]="member.introduction" name="introduction" rows="5"
                placeholder="Tell others about yourself..."></textarea>
            </div>

            <div class="form-section">
              <label class="form-label">Interests</label>
              <textarea class="form-textarea" [(ngModel)]="member.interests" name="interests" rows="5"
                placeholder="What are you into?"></textarea>
            </div>

            <div class="form-section">
              <label class="form-label">Location Details</label>
              <div class="location-row">
                <div class="location-field">
                  <label class="input-label" for="city">City</label>
                  <input [(ngModel)]="member.city" type="text" id="city" name="city"
                    class="form-input" placeholder="Your city" />
                </div>
                <div class="location-field">
                  <label class="input-label" for="country">Country</label>
                  <input [(ngModel)]="member.country" type="text" id="country" name="country"
                    class="form-input" placeholder="Your country" />
                </div>
              </div>
            </div>

          </form>
        </tab>

        <tab heading="Edit Photos">
          <app-photo-editor [member]="member"></app-photo-editor>
        </tab>

      </tabset>
    </div>

  </div>
</div>
